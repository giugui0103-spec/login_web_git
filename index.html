<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: blue;
            display: contents;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card{
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(0,0,0,0.1);
            width: 280px;
        }
        .login-card h2{
            margin-top: 0;
            text-align: center;
        }
        .form-groud{
            margin-bottom: 12px;
        }
        label{
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input{
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover{
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Iniciar secion</h2>
        <p style="font-size: 14px;color:#555;text-align: center;">
            Ingrese tus datos para acceder al sistema de prueba
        </p>
        <form>
            <div class="login-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
             <div class="login-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Acceder al sistema</button>
        </form>
        <p style="font-size: 12px;text-align: center;margin-top: 8px;">
            <a href="#">¿Olvidaste la contraseña?</a>
        </p>
    </div>
</body>
</html>
